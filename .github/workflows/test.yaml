name: Run Tests and Publish Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable chromium-chromedriver
          google-chrome --version
          chromedriver --version

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test
        continue-on-error: true
        env:
          SELENIDE_DRIVERMANAGER: false

      - name: Generate Allure report
        if: always()
        run: |
          sudo apt-get install -y wget
          wget -q https://github.com/allure-framework/allure2/releases/download/2.34.0/allure-2.34.0.tgz
          tar -xzf allure-2.34.0.tgz
          
          # Очищаем папку отчета перед генерацией
          rm -rf allure-report
          
          # Генерируем отчет
          ./allure-2.34.0/bin/allure generate build/allure-results -o allure-report --clean

      - name: Load previous report history
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-history
          fetch-depth: 1
        continue-on-error: true

      - name: Merge history with new report
        if: always()
        run: |
          echo "=== Checking for previous history ==="
          if [ -d "gh-pages-history/history" ]; then
            echo "Found previous history, copying..."
            mkdir -p allure-report/history
            cp -r gh-pages-history/history/* allure-report/history/ 2>/dev/null || echo "No history to copy"
            cp -r gh-pages-history/widgets/* allure-report/widgets/ 2>/dev/null || echo "No widgets to copy"
            cp -r gh-pages-history/data/* allure-report/data/ 2>/dev/null || echo "No data to copy"
            echo "History merged successfully"
          else
            echo "No previous history found - first run"
          fi
          
          # Добавляем .nojekyll для GitHub Pages
          touch allure-report/.nojekyll
          
          # Показываем структуру отчета
          echo "=== Report contents ==="
          ls -la allure-report/

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true  # Полностью пересоздаем ветку
          enable_jekyll: false
          commit_message: "Update Allure report - ${{ github.run_number }} [skip ci]"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: |
            Update Allure report
            - Run: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.head_commit.timestamp }}