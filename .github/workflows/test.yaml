name: Run Tests and Publish Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Chrome and ChromeDriver
        run: |
          echo "=== Installing Chrome ==="
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          echo "=== Chrome version ==="
          google-chrome --version
          
          echo "=== Installing ChromeDriver ==="
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VERSION"
          
          # Установка ChromeDriver через webdrivermanager или вручную
          sudo apt-get install -y chromium-chromedriver
          
          echo "=== ChromeDriver version ==="
          chromedriver --version

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test
        continue-on-error: true
        env:
          SELENIDE_DRIVERMANAGER: false  # Отключаем автоматическую загрузку драйверов
          CHROMEDRIVER_PATH: /usr/bin/chromedriver

      - name: Generate Allure report
        if: always()
        run: |
          sudo apt-get install -y wget
          wget -q https://github.com/allure-framework/allure2/releases/download/2.34.0/allure-2.34.0.tgz
          tar -xzf allure-2.34.0.tgz
          ./allure-2.34.0/bin/allure generate build/allure-results -o allure-report --clean

      - name: Load test report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Combine reports with history
        if: always()
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history allure-report/history 2>/dev/null || true
            cp -r gh-pages/data allure-report/data 2>/dev/null || true
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: false